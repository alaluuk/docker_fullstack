services:
  api:
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev           # Api käynnistetään Nodemonilla

  frontend:
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=${FRONTEND_PORT}
    command: npm start           
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
